<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maynooth ID Scanner - Web Portal</title>
    <style>
        body { font-family: Arial, sans-serif; 
            text-align: center; 
            background: #1a1a1a; 
            color: white; 
            margin: 0; }

        #login-overlay {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.95); 
            z-index: 1000;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }

        .login-box { 
            background: #333; 
            padding: 30px; 
            border-radius: 10px; 
            border: 1px solid #444; }

        /* Container scales to the screen but stays readable */
.container { 
    position: relative; 
    width: 95%;
    max-width: 1000px;
    aspect-ratio: 16 / 9;
    max-height: 70vh;
    margin: 20px auto;
    background: #000;
    border-radius: 12px;
    overflow: hidden; /* Keeps the rounded corners */
    border: 2px solid #333;
}

video { 
    width: 100%; 
    height: 100%;
    display: block;
    object-fit: cover;
}

.container.portrait-feed video {
    object-fit: contain;
}

/* Mobile Tweak: On small screens, make the height smaller */
@media (max-width: 600px) {
    .container {
        aspect-ratio: 16 / 9;
        max-height: 55vh;
    }
}

.overlay {
    position: absolute; 
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%);
    width: 88%; 
    aspect-ratio: 1.586 / 1;
    max-height: 80%;
    border: 3px dashed #00ff00; 
    pointer-events: none; 
    border-radius: 15px;
    box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5); /* Dim the outside area */
}

body.mobile-scan .overlay {
    width: 88%;
    height: 80%;
    aspect-ratio: auto;
    max-height: none;
}

        button {
            margin-top: 15px; 
            padding: 12px 25px; 
            font-size: 16px;
            background: #00ff00; 
            color: black; 
            border: none;
            cursor: pointer; 
            border-radius: 5px; 
            font-weight: bold;
        }

        #scan-form { 
            display: none; 
            margin: 20px auto; 
            padding: 20px; 
            background: #333; 
            width: 90%;
            max-width: 400px; 
            border-radius: 10px; 
            box-sizing: border-box;
        }

        .input-group { 
            margin: 15px 0; 
            text-align: left; }

        .input-group label { 
            display: block; 
            margin-bottom: 5px; 
            color: #aaa; 
            font-size: 14px; }
            
        input { 
            width: 100%; padding: 10px; box-sizing: border-box; 
            background: #222; border: 1px solid #444; color: #00ff00; 
            font-size: 18px; border-radius: 4px; text-transform: uppercase;
        }
        #status-message { margin-top: 10px; color: #00ff00; font-weight: bold; }
        .consent-area { margin: 15px 0; font-size: 13px; color: #ccc; text-align: left; }
        
        /* Table Styling */
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; color: black; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; font-size: 14px; }
        th { background: #007bff; color: white; }

        /* Laptop specific tweak */
        @media (min-width: 768px) {
            .container { min-height: 420px; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: #00ff00;">CSC ID Portal Login</h2>
            <input type="text" id="username" placeholder="Username" style="margin-bottom:10px;"><br>
            <input type="password" id="password" placeholder="Password" style="margin-bottom:10px;"><br>
            <button id="login-btn">ENTER SYSTEM</button>
            <p id="login-error" style="color:red; display:none; font-size:12px; margin-top:10px;">Invalid Credentials</p>
        </div>
    </div>

    <div id="account-header" style="display:none; background:#333; padding:10px; border-bottom:1px solid #444;">
        <span id="user-display" style="color:#00ff00; font-weight:bold; font-size: 16px;"></span>
        <div style="float:right;">
            <button id="dashboard-btn" style="background:#17a2b8; color:white; margin-top:0; padding: 8px 15px; font-size: 14px;">Logs</button>
            <button id="logout-btn" style="background:#444; color:white; margin-top:0; padding: 8px 15px; font-size: 14px;">Logout</button>
        </div>
        <div style="clear:both;"></div>
    </div>

    <div id="scanner-view">
        <h1 style="font-size: 24px; margin-bottom: 5px;">Student ID Scanner</h1>
        <p style="font-size: 14px; color: #888; margin: 0;">Please line your card with the green box</p>
        <div class="container">
            <video id="webcam" autoplay playsinline></video>
            <div class="overlay"></div>
        </div><br>

        <button id="capture">SCAN ID CARD</button>
        <button id="swap-camera" style="background: #444; color: white;">SWAP CAMERA</button>

        <div id="status-message">Ready to scan...</div>
        

        <div id="scan-form">
            <h3>Verify Your Details</h3>
            <div class="input-group">
                <label>Student ID:</label>
                <input type="text" id="id-field">
            </div>
            <div class="input-group">
                <label>Full Name:</label>
                <input type="text" id="name-field">
            </div>
            <div class="consent-area">
                <input type="checkbox" id="consent-check" style="width: auto;">
                <label for="consent-check">I consent to CSC processing my Name and ID. Stored for 30 days.</label>
            </div>
            <button id="submit-btn" style="background: #28a745; opacity: 0.5;" disabled>CONFIRM & SUBMIT</button>
        </div>
    </div>

    <div id="dashboard-view" style="display:none; padding:10px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
        <h2 id="display-role" style="font-size: 18px;">Attendance Logs</h2>
        <div style="background:#007bff; color:white; padding:10px; border-radius:5px; font-size: 14px;">
            Total: <span id="total-count">0</span>
        </div>
    </div>
    
    <div style="text-align: left; margin-bottom: 10px; display: flex; gap: 10px;">
        <button id="back-to-scanner" style="background:#6c757d; color:white; padding: 8px 15px; font-size: 14px; margin-top:0;">← Back</button>
        
        <button onclick="refreshData()" style="background:#28a745; color:white; padding: 8px 15px; font-size: 14px; margin-top:0;">🔄 Refresh Data</button>

        <input type="date" id="date-filter" style="margin-top:0; padding: 8px 10px; font-size: 14px; background: #222; border: 1px solid #444; color: #00ff00; border-radius: 4px;" />

        <button id="clear-filter-btn" style="background:#6c757d; color:white; padding: 8px 15px; font-size: 14px; margin-top:0;">Clear Filter</button>
        
        <button id="export-btn" style="background:#dc3545; color:white; padding: 8px 15px; font-size: 14px; margin-top:0;">Export PDF</button>
    </div>

    <div class="table-wrap">
        <table id="attendance-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Time</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="export.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/scan.js"></script>
    <script src="js/submit.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
